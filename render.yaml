services:
  - type: web
    name: hierarchy-processor-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.server:app --chdir backend
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: hierarchy_db
      - key: CORS_ORIGINS
        value: "*"
